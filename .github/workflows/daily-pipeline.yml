name: NRIBeat Daily Pipeline

on:
  schedule:
    # 5:00 AM EST = 10:00 AM UTC
    - cron: '0 10 * * *'

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — fetch + generate but do NOT publish or email'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      max_articles:
        description: 'Max articles to generate (1-10)'
        required: false
        default: '8'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # commit articles + data files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: nribeat/pipeline/requirements.txt

      - name: Install dependencies
        run: |
          cd nribeat/pipeline
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NRIBeat pipeline
        id: pipeline
        env:
          # Required
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main
          # News sources (optional — RSS fallback used if missing)
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          # Email digest
          CONVERTKIT_API_KEY: ${{ secrets.CONVERTKIT_API_KEY }}
          # Monetization — add these after AdSense approval
          ADSENSE_CLIENT_ID: ${{ secrets.ADSENSE_CLIENT_ID }}
          ADSENSE_SLOT_INTRO: ${{ secrets.ADSENSE_SLOT_INTRO }}
          ADSENSE_SLOT_MIDDLE: ${{ secrets.ADSENSE_SLOT_MIDDLE }}
          ADSENSE_SLOT_FOOTER: ${{ secrets.ADSENSE_SLOT_FOOTER }}
          # Pipeline control
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          MAX_ARTICLES: ${{ github.event.inputs.max_articles || '8' }}
        run: |
          cd nribeat/pipeline
          python pipeline.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: |
            nribeat/pipeline/pipeline.log
            output/dry_run_output.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload dry run output
        if: github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-articles-${{ github.run_number }}
          path: output/dry_run_output.json
          retention-days: 7
          if-no-files-found: ignore
