name: NRIBeat Daily Pipeline

on:
  schedule:
    # 5:00 AM EST = 10:00 AM UTC
    - cron: '0 10 * * *'
  
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (fetch + generate but do not publish)'
        required: false
        default: 'false'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: write  # Needed to commit new article files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd nribeat/pipeline
          pip install -r requirements.txt

      - name: Run NRIBeat pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          CONVERTKIT_API_KEY: ${{ secrets.CONVERTKIT_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd nribeat/pipeline
          python pipeline.py

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: nribeat/pipeline/pipeline.log
          retention-days: 7
